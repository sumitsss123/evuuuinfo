<!DOCTYPE html>
<html>
<head>
<title>EVUU | Countries Client Finder</title>

<link rel="icon" href="https://i.ibb.co/FLdpMBzq/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#4e5ac7,#5f3ca8);
color:white;
overflow-x:hidden;
}

/* ===== PARTICLES ===== */
#particles{
position:fixed;
top:0;left:0;width:100%;height:100%;
z-index:-1;
}

/* ===== HEADER ===== */
.topHeader{
display:flex;
align-items:center;
justify-content:center;
padding:25px 40px;
position:relative;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(15px);
}

.logoBox{
position:absolute;
left:30px;
display:flex;
align-items:center;
gap:12px;
}

.logoBox img{
width:60px;height:60px;
border-radius:50%;
background:white;
padding:3px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

.logoText{font-size:28px;font-weight:800;}
.headerTitle{font-size:36px;font-weight:700;text-align:center;}

/* ===== SEARCH ===== */
.searchBar{
width:50%;
margin:20px auto;
display:flex;
justify-content:center;
}

.searchBar input{
width:100%;
padding:12px 20px;
border-radius:12px;
border:none;
outline:none;
font-size:16px;
}

/* ===== COUNTRY GRID ===== */
.container{
width:95%;
margin:20px auto 50px;
display:grid;
grid-template-columns:repeat(7,1fr);
gap:20px;
}

.country{
background:rgba(0,0,0,0.35);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px 10px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
transition:0.4s;
height:230px;
display:flex;
flex-direction:column;
justify-content:space-between;
cursor:pointer;
}

.country:hover{
transform:translateY(-10px) scale(1.05);
background:rgba(0,0,0,0.45);
}

.country img{
width:100px;height:65px;
object-fit:cover;
margin:10px auto;
border-radius:8px;
transition:0.4s;
}

.country:hover img{ transform:scale(1.12); }

.country button{
padding:10px;
border:none;
border-radius:10px;
background:white;
color:#5f3ca8;
cursor:pointer;
font-weight:700;
transition:0.3s;
}

.country button:hover{
background:black;
color:white;
transform:scale(1.08);
box-shadow:0 0 15px rgba(255,255,255,0.6);
}

/* ===== CLIENT PAGE ===== */
.clientPage{
display:none;
padding:50px 20px;
text-align:center;
}

.boxContainer{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.box{
background:rgba(0,0,0,0.45);
padding:25px;
border-radius:20px;
width:260px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
transition:0.4s;
}

.box:hover{ transform:scale(1.05); }

.box img{
width:100%;
height:170px;
object-fit:cover;
border-radius:12px;
margin-bottom:15px;
}

.clientBtn{
padding:10px 20px;
border:none;
border-radius:10px;
background:white;
color:#5f3ca8;
cursor:pointer;
font-weight:700;
transition:0.3s;
}

.clientBtn:hover{
background:black;
color:white;
}

.backBtn{
margin-top:50px;
padding:14px 40px;
background:black;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

.backBtn:hover{ opacity:0.8; }

/* ===== RESPONSIVE ===== */
@media(max-width:1400px){.container{grid-template-columns:repeat(5,1fr);}}
@media(max-width:1100px){.container{grid-template-columns:repeat(4,1fr);}}
@media(max-width:850px){.container{grid-template-columns:repeat(3,1fr);} .searchBar{width:70%;}}
@media(max-width:600px){.container{grid-template-columns:repeat(2,1fr);} .searchBar{width:90%;}}
@media(max-width:400px){.container{grid-template-columns:repeat(1,1fr);}}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="topHeader">
<div class="logoBox">
<img src="https://i.ibb.co/FLdpMBzq/logo.png">
<span class="logoText">EVUU</span>
</div>
<div class="headerTitle">🌍 COUNTRIES CLIENT FINDER</div>
</div>

<div class="searchBar">
<input type="text" id="searchInput" placeholder="Search countries...">
</div>

<div id="countrySection" class="container"></div>

<div id="clientSection" class="clientPage">
<h1 id="countryTitle"></h1>

<div class="boxContainer">

<div class="box">
<img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
<button class="clientBtn" onclick="openServiceLink('Online Job')">Client Access</button>
<p>Online Job</p>
</div>

<div class="box">
<img src="https://images.unsplash.com/photo-1445205170230-053b83016050">
<button class="clientBtn" onclick="openServiceLink('Fashion')">Client Access</button>
<p>Fashion</p>
</div>

<div class="box">
<img src="https://images.unsplash.com/photo-1556745757-8d76bdb6984b">
<button class="clientBtn" onclick="openServiceLink('Digital Products')">Client Access</button>
<p>Digital Products</p>
</div>

<div class="box">
<img src="https://images.unsplash.com/photo-1611162616475-46b635cb6868">
<button class="clientBtn" onclick="openServiceLink('Ads')">Client Access</button>
<p>All Platform Ads Run</p>
</div>

</div>

<button class="backBtn" onclick="goBack()">Back</button>
</div>

<script>

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<100;i++){
p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3+1,dx:(Math.random()-0.5),dy:(Math.random()-0.5)});
}

(function anim(){
requestAnimationFrame(anim);
ctx.clearRect(0,0,canvas.width,canvas.height);
p.forEach(o=>{
o.x+=o.dx;o.y+=o.dy;
ctx.beginPath();
ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,0.05)";
ctx.fill();
});
})();

/* COUNTRIES */
const countries=["India","USA","Canada","UK","Germany","France","Japan","Australia","Italy","Brazil","UAE","Singapore","China","South Korea"];

const flags={India:"in",USA:"us",Canada:"ca",UK:"gb",Germany:"de",
France:"fr",Japan:"jp",Australia:"au",Italy:"it",
Brazil:"br",UAE:"ae",Singapore:"sg",China:"cn","South Korea":"kr"};

countrySection.innerHTML=countries.map(c=>`
<div class="country">
<h3>${c}</h3>
<img src="https://flagcdn.com/w80/${flags[c]}.png">
<button onclick="openCountryPage('${c}')">Find Client</button>
</div>`).join("");

let selectedCountry="";

/* SAME LINKS FOR ALL COUNTRIES */
const links={
"Online Job":"https://pin.it/3kyOUZ4Kk",
"Fashion":"https://pin.it/26mKW8h02",
"Digital Products":"https://pin.it/4f2uiNFZF",
"Ads":"https://t.me/evuuwithearning"
};

function openCountryPage(country){
selectedCountry=country;
countrySection.style.display="none";
document.querySelector(".searchBar").style.display="none";
clientSection.style.display="block";
countryTitle.innerText=country+" Client Page";
}

function goBack(){
clientSection.style.display="none";
countrySection.style.display="grid";
document.querySelector(".searchBar").style.display="flex";
}

function openServiceLink(service){
window.open(links[service],"_blank");
}

/* SEARCH */
searchInput.addEventListener("keyup",()=>{
let v=searchInput.value.toLowerCase();
document.querySelectorAll(".country").forEach(card=>{
card.style.display=card.querySelector("h3").innerText.toLowerCase().includes(v)?"flex":"none";
});
});

</script>

</body>
</html>
